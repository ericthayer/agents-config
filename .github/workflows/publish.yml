# Publish to npm
# Triggered automatically when semantic-release creates a GitHub release (release.yml),
# or manually via workflow_dispatch / version tags as a backup.
# IMPORTANT: NPM_TOKEN must be an npm "Automation" token (bypasses 2FA/OTP).
#   Create one at https://www.npmjs.com/settings/<user>/tokens → "Granular Access Token"
#   with "Automation" permission and add it as the NPM_TOKEN repository secret.

name: Publish to npm

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PACKAGE_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version $PACKAGE_VERSION matches tag"

      - name: Run tests
        run: |
          node bin/agents-init.js --help
          echo "1" | node bin/agents-init.js --dry-run || true

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
